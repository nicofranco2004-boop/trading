# Railway / Nixpacks build config.
#
# Nuestro requirements.txt vive en backend/ (no en raíz), por eso Nixpacks
# no auto-detecta Python y falla con "pip: command not found". Acá declaramos
# explícitamente las fases: instalar Python + gcc, crear venv, instalar deps,
# arrancar uvicorn.
#
# gcc se incluye porque bcrypt y cryptography compilan extensiones en C si
# no hay wheel disponible para la arch del build container.

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
