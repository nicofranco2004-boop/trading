# Railway / Nixpacks build config.
#
# Nuestro requirements.txt vive en backend/ (no en raíz), por eso Nixpacks
# no auto-detecta Python y falla con "pip: command not found". Acá declaramos
# explícitamente las fases: instalar Python + gcc, crear venv, instalar deps,
# arrancar uvicorn.
#
# gcc se incluye porque bcrypt y cryptography compilan extensiones en C si
# no hay wheel disponible para la arch del build container.

[phases.setup]
nixPkgs = ["python311", "gcc"]
# libstdc++ tiene que estar en LD_LIBRARY_PATH para que numpy (que viene con
# yfinance) pueda cargar sus C-extensions en runtime. Sin esto, el container
# arranca y crashea con "libstdc++.so.6: cannot open shared object file".
nixLibs = ["stdenv.cc.cc.lib"]

# PIN pip < 26: pip 26.1.1 (publicado 2026-05) tiene un bug en el resolver
# que devuelve "No matching distribution found for fastapi==0.115.0" aunque
# el package SÍ existe en PyPI. Hasta que salga un fix upstream, pinneamos
# a la última 25.x estable. Cuando salga pip 26.2 (con el fix) podemos
# volver a `--upgrade pip` sin restricción.
[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade 'pip<26'",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
