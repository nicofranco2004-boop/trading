<!DOCTYPE html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Safari (especialmente iOS) ignora `Cache-Control: max-age=0` del HTTP
         header en muchos casos y se queda con HTML viejo en su bfcache. Esto
         rompe SPAs con code splitting: el HTML cached referencia chunks JS
         con hashes que ya no existen tras un deploy nuevo. Solución: meta
         http-equiv como red de seguridad — Safari respeta esto mejor que
         el header (no siempre, pero ayuda). Ver también vercel.json. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Google Search Console — verificación de propiedad por meta tag.
         Permite a Google indexar rendi.finance + ver analytics de Search.
         No tocar / no borrar — si se elimina, Google deja de reconocer la
         propiedad y perdemos acceso a Search Console. -->
    <meta name="google-site-verification" content="GQPK2QQ8kL47BYsl4APvicqkG-fFWJGb8TRDu6ZYI9A" />

    <!-- Primary SEO -->
    <title>Rendi — Tu portfolio, con Coach IA | Tracker multi-broker para Argentina</title>
    <meta name="description" content="Seguí tu cartera de acciones, CEDEARs, bonos AR y crypto en un solo lugar. P&L real en USD, FIFO automático, Coach IA con memoria. Multi-broker: Cocos, IOL, Schwab, Binance, Balanz." />
    <meta name="keywords" content="tracker inversiones, portafolio argentina, coach ia inversiones, FIFO automatico, P&L USD real, multi-broker, Cocos, IOL, Schwab, Binance, Balanz, CEDEARs, bonos AR, AL30, inflacion, dolar blue, MEP" />
    <meta name="author" content="Rendi" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0A0B0E" />
    <!-- PWA standalone iOS: hace que "Agregar a inicio" abra la app sin las
         barras de Safari (status bar + bottom bar comen 100px de viewport).
         También requerido por iOS Safari para push notifications PWA-mode.
         (Android Chrome usa el manifest, iOS estos meta tags.) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rendi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="color-scheme" content="dark light" />
    <link rel="canonical" href="https://rendi.finance/" />

    <!-- Hreflang — geo SEO. Rendi solo está en es-AR, así que el alternativo
         es-AR + x-default fallback. Si en el futuro abrimos a otros países
         (Uruguay, Chile), agregar líneas alternate adicionales aquí. -->
    <link rel="alternate" hreflang="es-AR" href="https://rendi.finance/" />
    <link rel="alternate" hreflang="x-default" href="https://rendi.finance/" />

    <!-- Favicon / PWA — multi-formato 2026 standard.
         El ?v=2 es cache buster: browsers cachean favicons agresivamente
         (Safari por meses) y sin esto los users seguirían viendo el ícono
         viejo. Bumpear v=N cuando se actualice el branding.
         Tamaños: 16/32 para tab (retina), 180 para iOS home screen,
         192/512 para Android + PWA splash, ico para Windows + legacy. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512.png?v=2" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rendi" />
    <meta property="og:title" content="Rendi — Tu portfolio, con Coach IA" />
    <meta property="og:description" content="Seguí tu cartera multi-broker (Cocos, Schwab, Binance, Balanz). P&L real en USD, FIFO automático, Coach IA con memoria. Para inversores argentinos." />
    <meta property="og:url" content="https://rendi.finance/" />
    <meta property="og:image" content="https://rendi.finance/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_AR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rendi — Tu portfolio, con Coach IA" />
    <meta name="twitter:description" content="Tracker multi-broker para Argentina. P&L USD real, FIFO automático, Coach IA con memoria." />
    <meta name="twitter:image" content="https://rendi.finance/og-image.png" />

    <!-- Fonts — Geist (UI body + headings) + JetBrains Mono (labels mono).
         Performance fix (audit 2026-05-25): antes cargábamos también
         Instrument Serif + Manrope que NO se usan en ningún lado (Tailwind
         config solo declara Geist). Eran ~100-150KB blocking LCP de yapa.
         Geist se carga via @import en src/index.css. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect al backend Railway — abre el handshake TLS en paralelo al
         download del JS, ahorra 100-200ms en la primera llamada API (mobile 3G).
         La URL coincide con vercel.json:6 (rewrite a Railway). -->
    <link rel="preconnect" href="https://trading-production-143b.up.railway.app" crossorigin />

    <!-- Structured data: SoftwareApplication (qué es Rendi) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Rendi",
      "description": "Tracker de portafolio multi-broker con Coach IA. Seguí acciones, CEDEARs, bonos AR y crypto con P&L real en USD, FIFO automático y análisis con IA.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "inLanguage": "es-AR",
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Plus", "price": "4", "priceCurrency": "USD", "priceSpecification": { "@type": "UnitPriceSpecification", "billingDuration": "P1M" } },
        { "@type": "Offer", "name": "Pro", "price": "9", "priceCurrency": "USD", "priceSpecification": { "@type": "UnitPriceSpecification", "billingDuration": "P1M" } }
      ]
    }
    </script>

    <!-- Structured data: HowTo (cómo se usa Rendi — feeds rich results en
         Google + ayuda al SEO de la sección /#como-funciona).
         Sincronizado con HowItWorks en Landing.jsx (5 pasos). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "Cómo funciona Rendi — Tracker de inversiones con IA",
      "description": "Llevá el control de tu cartera multi-broker en 5 pasos: cargá, registrás operaciones, mirás insights, analizás con IA y le preguntás al coach.",
      "totalTime": "PT5M",
      "estimatedCost": { "@type": "MonetaryAmount", "currency": "USD", "value": "0" },
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Cargá tu cartera",
          "text": "Importás el CSV de Cocos, Schwab, Binance o Balanz, o agregás posiciones manualmente. Cada activo queda agrupado por broker con su moneda original, valor live en USD y P&L. Los depósitos y retiros se registran desde la caja de cada broker.",
          "url": "https://rendi.finance/#como-funciona"
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Registrás compras y ventas",
          "text": "Cada operación queda con su P&L en USD y % por broker. Las ventas aplican FIFO automático (criterio fiscal AR), descontando del lote más viejo primero, y se transfieren al historial de Operaciones.",
          "url": "https://rendi.finance/#como-funciona"
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Mirás tus Insights",
          "text": "Allocation por geografía, win rate, drawdown real, perfil de inversor declarado vs cartera real, concentración top 3. Datos limpios sobre cómo decidís.",
          "url": "https://rendi.finance/#como-funciona"
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "Analizás con IA cada pantalla",
          "text": "En Dashboard, Insights, Operaciones y Reportes, un botón Analizar genera un informe estructurado: qué funcionó, qué cambió, dónde hay riesgo, qué decisión podrías tomar. Usa el snapshot real de tu cartera.",
          "url": "https://rendi.finance/#como-funciona"
        },
        {
          "@type": "HowToStep",
          "position": 5,
          "name": "Le preguntás al Coach IA",
          "text": "En todos los planes accedés a 12 preguntas guiadas (6 consultas/semana). En Pro desbloqueás chat libre (40 consultas/semana) con memoria persistente: los hechos que le aclarás al bot los respeta entre sesiones.",
          "url": "https://rendi.finance/#como-funciona"
        }
      ]
    }
    </script>

    <!-- Structured data: Organization — define a Rendi como entidad para Google.
         Habilita Knowledge Graph + E-E-A-T signals (Experience/Expertise/
         Authority/Trust) que Google usa para rankear en finanzas (YMYL). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Rendi",
      "alternateName": "Rendi Finance",
      "url": "https://rendi.finance",
      "logo": "https://rendi.finance/favicon.svg",
      "description": "Tracker de portafolio multi-broker para inversores argentinos con Coach IA.",
      "email": "soporte@rendi.finance",
      "areaServed": { "@type": "Country", "name": "Argentina" },
      "knowsLanguage": ["es-AR", "es"],
      "knowsAbout": ["Inversiones", "CEDEARs", "Bonos Argentinos", "Criptomonedas", "FIFO", "P&L USD", "Mercado de capitales argentino"]
    }
    </script>

    <!-- Structured data: WebSite — habilita el "sitelinks searchbox" en SERPs
         de Google (cajita de búsqueda directa dentro del resultado de Rendi). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rendi",
      "url": "https://rendi.finance",
      "inLanguage": "es-AR",
      "publisher": { "@type": "Organization", "name": "Rendi", "url": "https://rendi.finance" }
    }
    </script>

    <script>if(localStorage.getItem('rendi_theme')!=='light')document.documentElement.classList.add('dark')</script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Contenido server-rendered para crawlers que NO ejecutan JS (WhatsApp,
         Facebook scraper, Twitter card validator, Linkedin) y como fallback
         si Googlebot deja la página en cola de rendering. Provee a Google
         contenido inicial mientras React monta. -->
    <noscript>

        <p>

      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
